version: '3.8'

services:
  # 1. Database: Thay SQL Server bằng MySQL 8.0
  database:
    image: mysql:8.0
    container_name: wms_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: YourStrongPassword123
      MYSQL_DATABASE: WarehouseDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Backend: Cấu hình Connection String cho MySQL
  api:
    build:
      context: .
      dockerfile: QLKHO_PhanVanHoang/Dockerfile
    container_name: wms_backend_api
    environment:
      - ConnectionStrings__DefaultConnection=Server=database;Port=3306;Database=WarehouseDb;Uid=root;Pwd=YourStrongPassword123;
      - Jwt__Key=ThisIsALongSecurityKeyForJWTSigning12345
      - Jwt__Issuer=WMS_Enterprise
      - Jwt__Audience=WMS_Client
      # Thêm cấu hình Cloudinary nếu bạn muốn test upload ảnh ở local
      - CloudinarySettings__CloudName=your_cloud_name
      - CloudinarySettings__ApiKey=your_api_key
      - CloudinarySettings__ApiSecret=your_api_secret
    ports:
      - "5000:8080" # ASP.NET 8 thường chạy port 8080 trong container
    depends_on:
      - database

  # 3. Frontend: Cập nhật đường dẫn thư mục web_asp
  frontend:
    build:
      context: ../web_asp  # Trỏ ra ngoài vì docker-compose nằm trong be-asp
    container_name: wms_frontend_react
    environment:
      - VITE_API_URL=http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mysql_data:
